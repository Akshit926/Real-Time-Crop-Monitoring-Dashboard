services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrovision-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agrovision-frontend
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
